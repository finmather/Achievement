# XcodeGen spec — the .xcodeproj is generated, never hand-edited.
#   brew install xcodegen
#   cp Config/Secrets.example.xcconfig Config/Secrets.xcconfig   (first time)
#   xcodegen generate
name: Achievement
options:
  bundleIdPrefix: app.achievement
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

configFiles:
  Debug: Config/Secrets.xcconfig
  Release: Config/Secrets.xcconfig

packages:
  AchievementCore:
    path: AchievementCore

targets:
  Achievement:
    type: application
    platform: iOS
    sources:
      - Achievement
    dependencies:
      - package: AchievementCore
    settings:
      base:
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: 1
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "5.9"
        SWIFT_STRICT_CONCURRENCY: targeted
        ENABLE_USER_SCRIPT_SANDBOXING: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    info:
      path: Achievement/Info.plist
      properties:
        CFBundleDisplayName: Achievement
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        ITSAppUsesNonExemptEncryption: false
        # Injected from Config/Secrets.xcconfig at build time.
        SteamAPIKey: $(STEAM_API_KEY)

  AchievementUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - AchievementUITests
    dependencies:
      - target: Achievement
    settings:
      base:
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: Achievement

schemes:
  Achievement:
    build:
      targets:
        Achievement: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - package: AchievementCore/AchievementCoreTests

  # Walks every screen in demo mode and attaches a screenshot of each —
  # used by CI (see .github/workflows/ios-screenshots.yml) since this
  # project is authored on Windows and has no local simulator to preview in.
  AchievementScreenshots:
    build:
      targets:
        Achievement: all
        AchievementUITests: [test]
    test:
      config: Debug
      targets:
        - AchievementUITests
