name: iOS build, tests, and screenshots

on:
  push:
    branches: [main, master]
  workflow_dispatch: {}

jobs:
  build-and-capture:
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Xcode version
        run: xcodebuild -version

      - name: Run AchievementCore unit tests
        run: cd AchievementCore && swift test

      - name: Install XcodeGen and xcparse
        run: brew install xcodegen chargepoint/xcparse/xcparse

      - name: Write empty secrets (demo mode needs no API key)
        run: |
          mkdir -p Config
          echo "STEAM_API_KEY =" > Config/Secrets.xcconfig

      - name: Generate Xcode project
        run: xcodegen generate

      - name: List available simulators
        run: xcrun simctl list devices available iPhone

      - name: Run screenshot UI test
        run: |
          xcodebuild test \
            -project Achievement.xcodeproj \
            -scheme AchievementScreenshots \
            -destination "platform=iOS Simulator,name=iPhone 16 Pro" \
            -resultBundlePath TestResults.xcresult

      - name: Extract screenshots from test result
        if: always()
        run: |
          mkdir -p screenshots
          xcparse screenshots TestResults.xcresult screenshots/

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: simulator-screenshots
          path: screenshots/
          if-no-files-found: warn

      - name: Upload full test result bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xcresult
          path: TestResults.xcresult
